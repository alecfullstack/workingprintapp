name: Build EXE

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: eetlekker-printagent/printagent

    steps:
      - name: Download code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Windows EXE
        run: npm run dist

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: EetlekkerPrintAgent-Setup
          path: |
            eetlekker-printagent/printagent/dist/*.exe
            eetlekker-printagent/printagent/release/*.exe
            eetlekker-printagent/printagent/out/*.exe
